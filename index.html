<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Sistem Surat Pengantar RT</title>

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

<style>

body{
font-family:Arial;
background:#f1f5f9;
}

.paper{
font-family:"Times New Roman";
background:white;
padding:40px;
}

canvas{
touch-action:none;
}

</style>
</head>

<body>

<div class="max-w-6xl mx-auto p-6 grid md:grid-cols-2 gap-6">

<!-- FORM -->
<div class="bg-white p-6 rounded-xl shadow">

<h2 class="font-bold text-xl mb-4">Data Surat</h2>

<input id="in_nama" placeholder="Nama Lengkap"
class="w-full border p-2 mb-2">

<input id="in_nik" placeholder="NIK"
class="w-full border p-2 mb-2">

<textarea id="in_alamat" placeholder="Alamat"
class="w-full border p-2 mb-2"></textarea>

<textarea id="in_keperluan" placeholder="Keperluan"
class="w-full border p-2 mb-4"></textarea>

<!-- TANDA TANGAN -->
<label class="font-bold">Tanda Tangan Ketua RT</label>

<canvas id="signature-pad"
width="300"
height="150"
style="border:2px solid black;background:white;"></canvas>

<div class="flex gap-2 mt-2">

<button onclick="clearSignature()"
class="bg-gray-600 text-white px-3 py-1 rounded">
Hapus TTD
</button>

<button onclick="saveSignature()"
class="bg-blue-600 text-white px-3 py-1 rounded">
Gunakan TTD
</button>

</div>

<div class="mt-6 flex gap-2">

<button onclick="updatePreview()"
class="bg-green-600 text-white px-4 py-2 rounded">
Preview
</button>

<button onclick="savePDF()"
class="bg-red-600 text-white px-4 py-2 rounded">
Simpan PDF
</button>

</div>

</div>


<!-- SURAT -->
<div id="print-area" class="paper shadow">

<h2 style="text-align:center;font-weight:bold">
SURAT PENGANTAR
</h2>

<p>
Yang bertanda tangan di bawah ini Ketua RT menerangkan bahwa:
</p>

<br>

<table>

<tr>
<td>Nama</td>
<td>:</td>
<td id="out_nama"></td>
</tr>

<tr>
<td>NIK</td>
<td>:</td>
<td id="out_nik"></td>
</tr>

<tr>
<td>Alamat</td>
<td>:</td>
<td id="out_alamat"></td>
</tr>

</table>

<br>

<p>Keperluan:</p>

<p id="out_keperluan"></p>

<br><br>

<div style="text-align:right">

<p>Ketua RT</p>

<br>

<img id="ttd_image"
style="width:150px">

<br>

<b>( <span id="out_nama_sign"></span> )</b>

</div>

</div>

</div>


<script>

// preview data

function updatePreview(){

document.getElementById("out_nama").innerText =
document.getElementById("in_nama").value

document.getElementById("out_nik").innerText =
document.getElementById("in_nik").value

document.getElementById("out_alamat").innerText =
document.getElementById("in_alamat").value

document.getElementById("out_keperluan").innerText =
document.getElementById("in_keperluan").value

document.getElementById("out_nama_sign").innerText =
document.getElementById("in_nama").value

}


// pdf

function savePDF(){

const element = document.getElementById("print-area")

html2pdf().from(element).save("surat_pengantar.pdf")

}



// ===========================
// TANDA TANGAN
// ===========================

const canvas = document.getElementById("signature-pad")
const ctx = canvas.getContext("2d")

let drawing=false

function getPosition(event){

const rect = canvas.getBoundingClientRect()

if(event.touches){

return{
x:event.touches[0].clientX-rect.left,
y:event.touches[0].clientY-rect.top
}

}else{

return{
x:event.clientX-rect.left,
y:event.clientY-rect.top
}

}

}

function startDraw(e){

drawing=true

const pos=getPosition(e)

ctx.beginPath()

ctx.moveTo(pos.x,pos.y)

}

function draw(e){

if(!drawing)return

e.preventDefault()

const pos=getPosition(e)

ctx.lineWidth=2
ctx.lineCap="round"

ctx.lineTo(pos.x,pos.y)

ctx.stroke()

}

function stopDraw(){

drawing=false

}


// mouse

canvas.addEventListener("mousedown",startDraw)
canvas.addEventListener("mousemove",draw)
canvas.addEventListener("mouseup",stopDraw)


// hp

canvas.addEventListener("touchstart",startDraw)
canvas.addEventListener("touchmove",draw)
canvas.addEventListener("touchend",stopDraw)



function clearSignature(){

ctx.clearRect(0,0,canvas.width,canvas.height)

}


function saveSignature(){

const dataURL = canvas.toDataURL("image/png")

document.getElementById("ttd_image").src=dataURL

}

</script>

</body>
</html>
